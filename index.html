<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murilo Yudi</title>
    <style>
        *{
          margin:0;
          padding:0;
          box-sizing:border-box;
          font-family: Arial, Helvetica, sans-serif;
        }
    
        body{
          background:
          linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
          url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1600&auto=format&fit=crop');
          background-size: cover;
          background-position: center;
          height:100vh;
        }
    
        header{
          width:100%;
          background: linear-gradient(90deg, #009739, #FFDF00, #002776);
          padding: 18px 50px;
          box-shadow: 0 4px 12px rgba(0,0,0,.4);
        }
    
        nav{
          display:flex;
          justify-content:space-between;
          align-items:center;
        }
    
        .logo{
          color:white;
          font-size:2rem;
          font-weight:bold;
          text-transform:uppercase;
          letter-spacing:2px;
          text-shadow:2px 2px 5px rgba(0,0,0,.5);
        }
    
        .logo span{
          color:#FFD700;
        }
    
        .menu{
          list-style:none;
          display:flex;
          gap:25px;
        }
    
        .menu li a{
          text-decoration:none;
          color:white;
          font-size:1.1rem;
          font-weight:bold;
          padding:10px 18px;
          border-radius:30px;
          transition:.3s;
          position:relative;
        }
    
        .menu li a:hover{
          background:white;
          color:#002776;
          transform:translateY(-3px);
          box-shadow:0 4px 10px rgba(0,0,0,.3);
        }
    
        .hero{
          height:calc(100vh - 90px);
          display:flex;
          justify-content:center;
          align-items:center;
          flex-direction:column;
          text-align:center;
          color:white;
        }
    
        .hero h1{
          font-size:4rem;
          margin-bottom:20px;
          text-shadow:3px 3px 10px rgba(0,0,0,.8);
        }
    
        .hero p{
          font-size:1.3rem;
          max-width:700px;
          margin-bottom:30px;
        }
    
        .btn{
          text-decoration:none;
          background:#FFD700;
          color:#002776;
          padding:15px 35px;
          border-radius:40px;
          font-weight:bold;
          font-size:1.1rem;
          transition:.3s;
        }
    
        .btn:hover{
          background:#009739;
          color:white;
          transform:scale(1.05);
        }
    
        @media(max-width:768px){
    
          nav{
            flex-direction:column;
            gap:20px;
          }
    
          .menu{
            flex-direction:column;
            text-align:center;
          }
    
          .hero h1{
            font-size:2.5rem;
          }
    
          .hero p{
            padding:0 20px;
          }
        }
      </style>
</head>

<body>
    <div class="container">
        <header>
            <nav>
                <div class="logo">World <span>Cup</span></div>
          
                <ul class="menu">
                  <li><a href="#">Início</a></li>
                  <li><a href="#">Seleções</a></li>
                  <li><a href="#">Jogos</a></li>
                  <li><a href="#">Ranking</a></li>
                  <li><a href="#">Ingressos</a></li>
                </ul>
              </nav>

        </header>
<section>


</section>
<footer>
    <p>Murilo Yudi</p>
</footer>

    </div>
    
</body>
</html>
